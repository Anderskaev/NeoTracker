<div class="container-center">
  <div class="container">
    <div class='hologram'>NEOTRACKER v. 1.3<div>[user 4471]</div></div>

  <div class="grid flex p-0 m-0">
    <div class="col-1 flex vertical-align-middle justify-content-center align-content-center">
      <span class="material-symbols-rounded m-0" style="align-self: center" [routerLink]="['/main']">arrow_back_ios_new</span>
      <span class="material-symbols-rounded" style="display: block; align-self: center; font-size: 40px;" [routerLink]="['/main']">home</span>
    </div>
    <div class="col-10 vertical-align-middle text-center flex justify-content-center">
      <div class="nested-grid">
        <div class="col-12"><h2>Настройки</h2></div>
      </div>
    </div>
    <div class="col-1 vertical-align-middle justify-content-center align-content-center"></div>
  </div>

  <div class="settings">
    <div class="flex grid text">
      <div class="col-4  flex align-items-center"><!-- dailydata col3+col3+col6 -->
        <label for="silent">
          Тихая загрузка
        </label>
      </div>
      <div class="col-3  flex align-items-center">
        <p-inputSwitch
        [(ngModel)]="silent"
        [trueValue] = "'silent'"
        [falseValue] = "'not'"
        />
      </div>
      <div class="col-5  flex align-items-center"></div>

    </div> <!-- grid  🕓 -->

    <div class="flex grid text">
      <div class="col-4 flex align-items-center"><!-- UTC col3+col9 -->
        <label for="utc">
          Часовой пояс
        </label>
      </div>
      <div class="col-8  flex align-items-center">
        <p-dropdown
        [(ngModel)]="timezone"
        class="w-full"
        [options]="utc"
        inputId="utc"
        optionLabel="name"
        optionValue="code"
        placeholder="Часовой пояс" />
      </div>   <!-- UTC col3+col9 -->
    </div> <!-- grid -->

    <div class="flex grid text">
      <div class="col-4 flex align-items-center"><!-- UTC col3+col9 -->
        <label for="time">
          Напомнить
        </label>
      </div>
      <div class="col-3  flex align-items-center">
        <p-inputSwitch
        [(ngModel)]="time_switch"
        [trueValue] = "1"
        [falseValue] = "0"
        />
      </div>
      <div class="col-5 flex align-items-center">
        <p-dropdown
        [(ngModel)]="timeremind"
        class="w-full"
        [options]="time"
        inputId="time"
        optionLabel="name"
        optionValue="code"
        placeholder="Время" />
      </div>   <!-- UTC col3+col9 -->
    </div> <!-- grid -->

  </div> <!-- div settings ⏰ -->


   <br/>
  <div class="console-buttons">
    <button (click)="saveSettings()">Сохранить</button>
    <button class="back-button" [routerLink]="['/main']">Назад</button>
  </div>



  </div>

  </div>
