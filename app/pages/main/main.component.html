 <div class="container">
    <div class='hologram'>NEOTRACKER v. 1.3<div>[user 4471]</div></div>
    <br/><br/><br/>
    <div class="mission" (click)="msg();"><strong>Миссия: {{mission.title}}</strong></div>

    <div class="stats">

      <div class="col-4">
        <div class="stat">
          <span class="flex justify-content-center material-symbols-rounded vertical-align-middle col-12 p-0 m-0" style="font-size: 40px">directions_walk</span>
          <span class="flex justify-content-center col-12">{{ steps }}</span>
        </div>
      </div>
      <div class="col-4">
        <div class="stat">
          <span class="flex justify-content-center material-symbols-rounded vertical-align-middle col-12 fill p-0 m-0" style="font-size: 40px">water_medium</span>
          <span class="flex justify-content-center col-12">{{ water }}</span>
        </div>
      </div>
      <div class="col-4">
        <div class="stat">
          <span class="flex justify-content-center material-symbols-rounded vertical-align-middle col-12 p-0 m-0" style="font-size: 40px">restaurant</span>
          <span class="flex justify-content-center col-12">{{ calories }}</span>
        </div>
      </div>
    </div>


<div class="grid flex console-buttons">
    <button [routerLink]="['/dataenter']" class="stat flex col-5 justify-content-center vertical-align-middle">
        <span class="material-symbols-rounded vertical-align-middle">database</span>
        <span class="vertical-align-middle text">Ввод данных</span>
    </button>
    <button [routerLink]="['/profile']"  class="stat flex col-5 justify-content-center vertical-align-middle">
        <span class="material-symbols-rounded vertical-align-middle">account_circle</span>
        <span class="vertical-align-middle text">Профиль</span>
    </button>
</div>

<div  class="grid flex console-buttons">
    <button [routerLink]="['/stats']" class="stat flex col-5 justify-content-center vertical-align-middle">
      <span class="material-symbols-rounded fill vertical-align-middle">monitoring</span>
      <span class="vertical-align-middle text">Статистика</span>
    </button>
    <button [routerLink]="['/settings']" class="stat flex col-5 justify-content-center vertical-align-middle">
      <span class="material-symbols-rounded vertical-align-middle">settings</span>
      <span class="vertical-align-middle text">Настройки</span>
  </button>
</div>
