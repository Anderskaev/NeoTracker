<div class="container-center">
<div class="container">
  <div class='hologram'>NEOTRACKER v. 1.3<div>[user 4471]</div></div>

<div class="grid flex p-0 m-0">
  <div class="col-1 flex vertical-align-middle justify-content-center align-content-center">
    <span class="material-symbols-rounded m-0" style="align-self: center" [routerLink]="['/main']">arrow_back_ios_new</span>
    <span class="material-symbols-rounded" style="display: block; align-self: center; font-size: 40px;" [routerLink]="['/main']">home</span>
  </div>
  <div class="col-10 vertical-align-middle text-center flex justify-content-center">
    <div class="nested-grid">
      <div class="col-12"><h2>Ввод данных</h2></div>
    </div>
  </div>
  <div class="col-1 vertical-align-middle justify-content-center align-content-center"></div>
</div>

<div class="flex grid text">
  <div class="col-6 flex align-items-center"><!-- UTC col3+col9 -->
    <label for="steps">
      Количество шагов
    </label>
  </div>
  <div class="col-6  flex align-items-center">
    <p-inputNumber  min="0" inputId="steps" id="steps" mode="decimal" [(ngModel)]="steps"/>
  </div>   <!-- UTC col3+col9 -->
</div> <!-- grid -->

<div class="flex grid text">
  <div class="col-6 flex align-items-center"><!-- UTC col3+col9 -->
    <label for="water">
      Количество воды
    </label>
  </div>
  <div class="col-6  flex align-items-center">
    <p-inputNumber  min="0" inputId="water" id="water" mode="decimal" [(ngModel)]="water"/>
  </div>   <!-- UTC col3+col9 -->
</div> <!-- grid -->

<div class="flex grid text">
  <div class="col-6 flex align-items-center"><!-- UTC col3+col9 -->
    <label for="calories">
      Количество калорий
    </label>
  </div>
  <div class="col-6  flex align-items-center">
    <p-inputNumber  min="0" inputId="calories" id="calories" mode="decimal" [(ngModel)]="calories"/>
  </div>   <!-- UTC col3+col9 -->
</div> <!-- grid -->

<div class="console-buttons">
  <button (click)="addStats()">Добавить</button>
  <button (click)="setStats()">Установить</button>
  <button class="back-button" [routerLink]="['/main']">Назад</button>
</div>

</div>
<p class="success" style="max-width: 90%; font-family: Play; font-size: 9pt;">Оставтье поле показателя пустым если не хотите его менять</p>

</div>
